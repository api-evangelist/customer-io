naftiko: 1.0.0-alpha2
info:
  label: Customer.io App API — Activities
  description: 'Customer.io App API — Activities. 1 operations. Lead operation: List activities. Self-contained Naftiko capability
    covering one Customer Io business surface.'
  tags:
  - Customer Io
  - Activities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CUSTOMER_IO_API_KEY: CUSTOMER_IO_API_KEY
capability:
  consumes:
  - type: http
    namespace: app-activities
    baseUri: https://api.customer.io/v1
    description: Customer.io App API — Activities business capability. Self-contained, no shared references.
    resources:
    - name: activities
      path: /activities
      operations:
      - name: listactivities
        method: GET
        description: List activities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: type
          in: query
          type: string
          description: Filter activities by type.
        - name: name
          in: query
          type: string
          description: Filter activities by name.
    authentication:
      type: bearer
      token: '{{env.CUSTOMER_IO_API_KEY}}'
  exposes:
  - type: rest
    namespace: app-activities-rest
    port: 8080
    description: REST adapter for Customer.io App API — Activities. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/activities
      name: activities
      description: REST surface for activities.
      operations:
      - method: GET
        name: listactivities
        description: List activities
        call: app-activities.listactivities
        with:
          type: rest.type
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: app-activities-mcp
    port: 9090
    transport: http
    description: MCP adapter for Customer.io App API — Activities. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-activities
      description: List activities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: app-activities.listactivities
      with:
        type: tools.type
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
