naftiko: 1.0.0-alpha2
info:
  label: Customer.io App API — Sender Identities
  description: 'Customer.io App API — Sender Identities. 2 operations. Lead operation: List sender identities. Self-contained
    Naftiko capability covering one Customer Io business surface.'
  tags:
  - Customer Io
  - Sender Identities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CUSTOMER_IO_API_KEY: CUSTOMER_IO_API_KEY
capability:
  consumes:
  - type: http
    namespace: app-sender-identities
    baseUri: https://api.customer.io/v1
    description: Customer.io App API — Sender Identities business capability. Self-contained, no shared references.
    resources:
    - name: sender_identities
      path: /sender_identities
      operations:
      - name: listsenderidentities
        method: GET
        description: List sender identities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sender_identities-sender_id
      path: /sender_identities/{sender_id}
      operations:
      - name: getsenderidentity
        method: GET
        description: Get a sender identity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CUSTOMER_IO_API_KEY}}'
  exposes:
  - type: rest
    namespace: app-sender-identities-rest
    port: 8080
    description: REST adapter for Customer.io App API — Sender Identities. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/sender-identities
      name: sender-identities
      description: REST surface for sender_identities.
      operations:
      - method: GET
        name: listsenderidentities
        description: List sender identities
        call: app-sender-identities.listsenderidentities
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sender-identities/{sender-id}
      name: sender-identities-sender-id
      description: REST surface for sender_identities-sender_id.
      operations:
      - method: GET
        name: getsenderidentity
        description: Get a sender identity
        call: app-sender-identities.getsenderidentity
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: app-sender-identities-mcp
    port: 9090
    transport: http
    description: MCP adapter for Customer.io App API — Sender Identities. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-sender-identities
      description: List sender identities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: app-sender-identities.listsenderidentities
      outputParameters:
      - type: object
        mapping: $.
    - name: get-sender-identity
      description: Get a sender identity
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: app-sender-identities.getsenderidentity
      outputParameters:
      - type: object
        mapping: $.
