naftiko: 1.0.0-alpha2
info:
  label: Customer.io Pipelines API — Alias
  description: 'Customer.io Pipelines API — Alias. 1 operations. Lead operation: Alias a person. Self-contained Naftiko capability
    covering one Customer Io business surface.'
  tags:
  - Customer Io
  - Alias
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CUSTOMER_IO_API_KEY: CUSTOMER_IO_API_KEY
capability:
  consumes:
  - type: http
    namespace: pipelines-alias
    baseUri: https://cdp.customer.io/v1
    description: Customer.io Pipelines API — Alias business capability. Self-contained, no shared references.
    resources:
    - name: alias
      path: /alias
      operations:
      - name: aliasperson
        method: POST
        description: Alias a person
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.CUSTOMER_IO_USER}}'
      password: '{{env.CUSTOMER_IO_PASS}}'
  exposes:
  - type: rest
    namespace: pipelines-alias-rest
    port: 8080
    description: REST adapter for Customer.io Pipelines API — Alias. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/alias
      name: alias
      description: REST surface for alias.
      operations:
      - method: POST
        name: aliasperson
        description: Alias a person
        call: pipelines-alias.aliasperson
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pipelines-alias-mcp
    port: 9090
    transport: http
    description: MCP adapter for Customer.io Pipelines API — Alias. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: alias-person
      description: Alias a person
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pipelines-alias.aliasperson
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
