naftiko: 1.0.0-alpha2
info:
  label: Customer.io App API — Messages
  description: 'Customer.io App API — Messages. 1 operations. Lead operation: Get a message. Self-contained Naftiko capability
    covering one Customer Io business surface.'
  tags:
  - Customer Io
  - Messages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CUSTOMER_IO_API_KEY: CUSTOMER_IO_API_KEY
capability:
  consumes:
  - type: http
    namespace: app-messages
    baseUri: https://api.customer.io/v1
    description: Customer.io App API — Messages business capability. Self-contained, no shared references.
    resources:
    - name: messages-message_id
      path: /messages/{message_id}
      operations:
      - name: getmessage
        method: GET
        description: Get a message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CUSTOMER_IO_API_KEY}}'
  exposes:
  - type: rest
    namespace: app-messages-rest
    port: 8080
    description: REST adapter for Customer.io App API — Messages. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/messages/{message-id}
      name: messages-message-id
      description: REST surface for messages-message_id.
      operations:
      - method: GET
        name: getmessage
        description: Get a message
        call: app-messages.getmessage
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: app-messages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Customer.io App API — Messages. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-message
      description: Get a message
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: app-messages.getmessage
      outputParameters:
      - type: object
        mapping: $.
