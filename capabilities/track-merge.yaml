naftiko: 1.0.0-alpha2
info:
  label: Customer.io Track API — Merge
  description: 'Customer.io Track API — Merge. 1 operations. Lead operation: Merge customer profiles. Self-contained Naftiko
    capability covering one Customer Io business surface.'
  tags:
  - Customer Io
  - Merge
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CUSTOMER_IO_API_KEY: CUSTOMER_IO_API_KEY
capability:
  consumes:
  - type: http
    namespace: track-merge
    baseUri: https://track.customer.io/api/v1
    description: Customer.io Track API — Merge business capability. Self-contained, no shared references.
    resources:
    - name: merge
      path: /merge
      operations:
      - name: mergecustomers
        method: POST
        description: Merge customer profiles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.CUSTOMER_IO_USER}}'
      password: '{{env.CUSTOMER_IO_PASS}}'
  exposes:
  - type: rest
    namespace: track-merge-rest
    port: 8080
    description: REST adapter for Customer.io Track API — Merge. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/merge
      name: merge
      description: REST surface for merge.
      operations:
      - method: POST
        name: mergecustomers
        description: Merge customer profiles
        call: track-merge.mergecustomers
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: track-merge-mcp
    port: 9090
    transport: http
    description: MCP adapter for Customer.io Track API — Merge. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: merge-customer-profiles
      description: Merge customer profiles
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: track-merge.mergecustomers
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
