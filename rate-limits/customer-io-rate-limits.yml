specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Customer.io
providerId: customer-io
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Customer Data Platform
  - Marketing Automation
  - Messaging
  - Rate Limiting
  - Quotas
  - Throttling
description: Customer.io exposes three primary APIs (Track, App, Pipelines / CDP) with per-workspace
  rate limits. Documented limits are not currently published as fixed numeric thresholds in public docs;
  Customer.io throttles via HTTP 429 with Retry-After. Track API is optimized for high-throughput event
  ingestion; App and CDP have lower default budgets.
sources:
  - https://customer.io/pricing/
  - https://docs.customer.io/api/
notes: Public docs do not publish fixed RPS numbers; reach out to support for raised limits on Premium /
  Enterprise tiers. Soft caps are workspace-scoped, not per-key.
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - name: Track API (event ingestion)
    scope: workspace
    metric: requests_per_second
    limit: see Customer.io API reference (high-throughput ingestion)
    applies:
      - Customer.io Track API
  - name: App API (campaigns / broadcasts / segments)
    scope: workspace
    metric: requests_per_second
    limit: see Customer.io API reference
    applies:
      - Customer.io App API
  - name: Pipelines (CDP) API
    scope: workspace
    metric: requests_per_second
    limit: see Customer.io API reference
    applies:
      - Customer.io Pipelines API
  - name: Per-workspace email send budget
    scope: workspace
    metric: emails_per_month
    limit: tied to plan (1M included on Essentials; custom on Premium / Enterprise)
    applies:
      - Customer.io App API
policies:
  - name: Backoff Strategy
    description: On 429, honor the Retry-After header (seconds). Use exponential backoff with jitter on
      additional retries.
  - name: Bulk-friendly endpoints
    description: Use the batch identify and batch event endpoints rather than tight loops of single calls
      to stay within ingestion budgets.
  - name: Plan-tied volume caps
    description: Email volume caps are set by plan (Essentials 1M / Premium custom / Enterprise custom);
      overage is metered, not throttled.
  - name: Soft-vs-hard limits
    description: Soft rate caps return 429 and recover on Retry-After; sustained over-cap traffic may
      trigger workspace-scoped backpressure.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
