  description: The Customer.io Pipelines API is the newer data ingestion interface for getting customer and event data into
    Customer.io. It follows the Segment spec and supports identify, track, page, screen, group, and alias calls. Customer.io
    recommends the Pipelines API for new integrations because it is easier to use, supports outbound data integrations and
    transformations, and is the focus of ongoing development.
